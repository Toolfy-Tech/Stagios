name: Déployer Stagios sur GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Injecter l'URL du proxy
        env:
          FT_PROXY: ${{ secrets.FT_PROXY_URL }}
        run: |
          sed -i "s|__FT_PROXY_URL__|${FT_PROXY}|g" index.html

      - name: Déployer sur branche gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir /tmp/deploy
          cp index.html /tmp/deploy/
          cp professeurs.html /tmp/deploy/ 2>/dev/null || true
          git fetch origin gh-pages 2>/dev/null || true
          git checkout gh-pages 2>/dev/null || git checkout --orphan gh-pages
          git rm -rf . --quiet 2>/dev/null || true
          cp /tmp/deploy/index.html .
          cp /tmp/deploy/professeurs.html . 2>/dev/null || true
          git add -f index.html professeurs.html
          git diff --cached --quiet && echo "Rien à déployer" && exit 0
          git commit -m "Deploy $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push --force origin gh-pages
