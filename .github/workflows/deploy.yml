name: Déployer Stagios sur GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Injecter les credentials France Travail et l'URL du proxy
        env:
          FT_ID: ${{ secrets.FT_CLIENT_ID }}
          FT_SEC: ${{ secrets.FT_CLIENT_SECRET }}
          FT_PROXY: ${{ secrets.FT_PROXY_URL }}
        run: |
          sed -i "s|__FT_CLIENT_ID__|${FT_ID}|g" index.html
          sed -i "s|__FT_CLIENT_SECRET__|${FT_SEC}|g" index.html
          sed -i "s|__FT_PROXY_URL__|${FT_PROXY}|g" index.html

      - name: Déployer sur GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          exclude_assets: '.github,cf-worker,CONTEXT.md'
