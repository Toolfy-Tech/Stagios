name: Déployer Stagios sur GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Injecter l'URL du Worker France Travail
        env:
          FT_PROXY: ${{ secrets.FT_PROXY_URL }}
        run: |
          sed -i "s|__FT_PROXY_URL__|${FT_PROXY}|g" index.html

      - name: Configurer GitHub Pages
        uses: actions/configure-pages@v4

      - name: Uploader les fichiers du site
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Déployer sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
