name: Déployer Stagios sur GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Injecter l'URL du proxy
        env:
          FT_PROXY: ${{ secrets.FT_PROXY_URL }}
        run: |
          sed -i "s|__FT_PROXY_URL__|${FT_PROXY}|g" index.html

      - name: Préparer les fichiers
        run: |
          mkdir _site
          cp index.html _site/
          cp professeurs.html _site/ 2>/dev/null || true

      - name: Upload artifact Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Déployer sur GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
